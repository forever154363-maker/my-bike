<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>車輛工程紀錄</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>車輛工程紀錄簿</h1>
    </header>

    <div class="container">
        
        <section class="photo-card">
            <img src="car-image.jpg" alt="請將照片命名為 car-image.jpg 並放入資料夾" id="cover-photo" onerror="this.src='https://via.placeholder.com/800x450/1c1c1e/8e8e93?text=請放入+car-image.jpg'">
        </section>

        <section class="card">
            <h2 class="section-title">基本資料</h2>
            <div class="input-group">
                <label>出廠年月分</label><input type="text" id="info-date" class="auto-save" placeholder="例: 2023/05">
            </div>
            <div class="input-group">
                <label>車型</label><input type="text" id="info-model" class="auto-save" placeholder="輸入車型">
            </div>
            <div class="input-group">
                <label>行照號碼</label><input type="text" id="info-plate" class="auto-save" placeholder="輸入車牌">
            </div>
            <div class="input-group">
                <label>引擎號碼</label><input type="text" id="info-engine" class="auto-save" placeholder="輸入引擎號碼">
            </div>
        </section>

        <div class="section-header">改裝品清單清冊</div>
        
        <details class="accordion-card">
            <summary>1. 剎車系統</summary>
            <div class="accordion-content">
                <h3>(1) 前煞車</h3>
                <div class="input-group"><label>A. 總泵</label><input type="text" id="brake-f-pump" class="auto-save" placeholder="廠牌/規格"></div>
                <div class="input-group"><label>B. 卡鉗</label><input type="text" id="brake-f-caliper" class="auto-save" placeholder="廠牌/規格"></div>
                <div class="input-group"><label>C. 碟盤</label><input type="text" id="brake-f-disc" class="auto-save" placeholder="廠牌/規格"></div>
                
                <h3>(2) 後煞車</h3>
                <div class="input-group"><label>A. 總泵</label><input type="text" id="brake-r-pump" class="auto-save" placeholder="廠牌/規格"></div>
                <div class="input-group"><label>B. 卡鉗</label><input type="text" id="brake-r-caliper" class="auto-save" placeholder="廠牌/規格"></div>
                <div class="input-group"><label>C. 碟盤</label><input type="text" id="brake-r-disc" class="auto-save" placeholder="廠牌/規格"></div>
            </div>
        </details>

        <details class="accordion-card">
            <summary>2. 外觀系統</summary>
            <div class="accordion-content">
                <div class="input-group"><label>風鏡</label><input type="text" id="ext-windshield" class="auto-save" placeholder="記錄廠牌款式"></div>
                <div class="input-group"><label>碳纖維貼片</label><input type="text" id="ext-carbon" class="auto-save" placeholder="記錄部位/廠牌"></div>
                <div class="input-group"><label>後照鏡</label><input type="text" id="ext-mirror" class="auto-save" placeholder="記錄廠牌款式"></div>
                <div class="input-group"><label>前土除</label><input type="text" id="ext-f-fender" class="auto-save" placeholder="記錄廠牌款式"></div>
                <div class="input-group"><label>後土除</label><input type="text" id="ext-r-fender" class="auto-save" placeholder="記錄廠牌款式"></div>
                <div class="input-group"><label>內後土除</label><input type="text" id="ext-in-fender" class="auto-save" placeholder="記錄廠牌款式"></div>
            </div>
        </details>

        <details class="accordion-card">
            <summary>3. 輪胎與輪框系統</summary>
            <div class="accordion-content">
                <div class="input-group"><label>前輪胎</label><input type="text" id="tire-f" class="auto-save" placeholder="型號與規格"></div>
                <div class="input-group"><label>後輪胎</label><input type="text" id="tire-r" class="auto-save" placeholder="型號與規格"></div>
                <div class="input-group"><label>前輪框</label><input type="text" id="wheel-f" class="auto-save" placeholder="廠牌/材質"></div>
                <div class="input-group"><label>後輪框</label><input type="text" id="wheel-r" class="auto-save" placeholder="廠牌/材質"></div>
            </div>
        </details>

        <details class="accordion-card">
            <summary>4. 懸吊系統設定 (段數紀錄)</summary>
            <div class="accordion-content">
                <h3>前避震</h3>
                <div class="input-group inline-input">
                    <label>HSC</label>
                    <div><input type="number" id="susp-f-hsc" class="auto-save susp-num"> / 34</div>
                </div>
                <div class="input-group inline-input">
                    <label>LSC</label>
                    <div><input type="number" id="susp-f-lsc" class="auto-save susp-num"> / 28</div>
                </div>
                <div class="input-group inline-input">
                    <label>HSR</label>
                    <div><input type="number" id="susp-f-hsr" class="auto-save susp-num"> / 25</div>
                </div>
                <div class="input-group inline-input">
                    <label>LSR</label>
                    <div><input type="number" id="susp-f-lsr" class="auto-save susp-num"> / 29</div>
                </div>
                <div class="input-group inline-input">
                    <label>前阻尼器</label>
                    <div><input type="number" id="susp-f-damper" class="auto-save susp-num"> / 42</div>
                </div>

                <h3>後避震</h3>
                <div class="input-group inline-input">
                    <label>C</label>
                    <div><input type="number" id="susp-r-c" class="auto-save susp-num"> / 21</div>
                </div>
                <div class="input-group inline-input">
                    <label>R</label>
                    <div><input type="number" id="susp-r-r" class="auto-save susp-num"> / 42</div>
                </div>
                <div class="input-group inline-input">
                    <label>後阻尼器</label>
                    <div><input type="number" id="susp-r-damper" class="auto-save susp-num"> / 42</div>
                </div>
                
                <button class="action-btn susp-btn" onclick="saveSuspensionRecord()">💾 儲存為今日新設定</button>
                
                <div class="history-section">
                    <h4>避震器設定歷程</h4>
                    <div id="suspension-history">
                        </div>
                </div>
            </div>
        </details>

        <p class="save-hint">💡 文字輸入後會自動暫存，懸吊與油耗請點擊按鈕產生歷史紀錄。</p>

        <div class="section-header">油耗工程統計</div>
        <section class="card fuel-card">
            <div class="input-group"><label>目前總里程 (km)</label><input type="number" id="fuel-km" placeholder="例: 15200"></div>
            <div class="input-group"><label>加油量 (公升)</label><input type="number" id="fuel-liters" placeholder="例: 12.5"></div>
            <div class="input-group"><label>加什麼油</label><input type="text" id="fuel-type" placeholder="例: 98無鉛"></div>
            <div class="input-group"><label>單價 (元/L)</label><input type="number" id="fuel-price" placeholder="例: 32.5"></div>
            
            <button class="action-btn" onclick="saveFuelRecord()">⛽ 新增油耗紀錄</button>

            <div class="history-section">
                <h4>加油歷程與油耗運算</h4>
                <div id="fuel-history">
                    </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
